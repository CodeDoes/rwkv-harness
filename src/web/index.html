<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RWKV Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; }
  .sidebar { width: 220px; background: #161b22; border-right: 1px solid #30363d; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar h2 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .session { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 2px; }
  .session:hover { background: #1c2128; }
  .session.active { background: #1f6feb22; border: 1px solid #1f6feb55; }
  .new-btn { width: 100%; padding: 6px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 8px; }
  .new-btn:hover { background: #30363d; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .header { padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 15px; }
  .header .meta { font-size: 11px; color: #8b949e; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; }
  .msg { margin-bottom: 12px; max-width: 80%; }
  .msg.user { margin-left: auto; }
  .msg.user .bubble { background: #1f6feb; }
  .msg.assistant .bubble { background: #21262d; border: 1px solid #30363d; }
  .bubble { padding: 10px 14px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
  .input-area { padding: 12px 20px; border-top: 1px solid #30363d; display: flex; gap: 8px; }
  .input-area textarea { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 14px; resize: none; font-family: inherit; }
  .input-area textarea:focus { outline: none; border-color: #1f6feb; }
  .input-area button { padding: 8px 16px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; }
  .input-area button:hover { background: #2ea043; }
  .input-area button:disabled { opacity: .5; }
  .status { padding: 4px 20px; background: #161b22; font-size: 11px; color: #8b949e; }
  .loading { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #238636; margin-left: 6px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
</style>
</head>
<body>
<div class="sidebar">
  <h2>Sessions</h2>
  <button class="new-btn" onclick="newSession()">+ New</button>
  <div id="session-list"></div>
</div>
<div class="main">
  <div class="header">
    <div>
      <h1 id="session-name">default</h1>
      <div class="meta" id="session-meta"></div>
    </div>
  </div>
  <div class="status" id="status">Disconnected</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="2" placeholder="Type..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>
<script>
let ws = null
let currentSession = "default"
let sessions = ["default"]
let messages = []
let generating = false

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:"
  ws = new WebSocket(`${proto}//${location.host}`)

  ws.onopen = () => {
    document.getElementById("status").textContent = "Connected"
  }

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data)

    switch (msg.type) {
      case "connected":
        currentSession = msg.session?.label || "default"
        messages = msg.messages || []
        sessions = msg.sessions || ["default"]
        renderAll()
        document.getElementById("status").textContent = "Connected"
        break

      case "token":
        const last = messages[messages.length - 1]
        if (last && last.role === "assistant") {
          last.content += msg.text
        } else {
          messages.push({ role: "assistant", content: msg.text, timestamp: new Date().toISOString() })
        }
        renderMessages()
        break

      case "done":
        messages = msg.messages || messages
        generating = false
        document.getElementById("send-btn").disabled = false
        document.getElementById("status").textContent = "Connected"
        renderAll()
        break

      case "session_created":
      case "session_switched":
        currentSession = msg.session?.label || currentSession
        messages = msg.messages || []
        sessions = [...new Set([...sessions, currentSession])]
        renderAll()
        break

      case "session_deleted":
        currentSession = msg.current?.label || "default"
        messages = msg.messages || []
        sessions = sessions.filter(s => s !== msg.label)
        renderAll()
        break

      case "error":
        document.getElementById("status").textContent = "Error: " + msg.message
        generating = false
        document.getElementById("send-btn").disabled = false
        break
    }
  }

  ws.onclose = () => {
    document.getElementById("status").textContent = "Disconnected (reconnect...)"
    generating = false
    document.getElementById("send-btn").disabled = false
    setTimeout(connect, 2000)
  }

  ws.onerror = () => ws.close()
}

function renderAll() {
  renderSessions()
  renderMessages()
  document.getElementById("session-name").textContent = currentSession
  document.getElementById("session-meta").textContent = `Messages: ${messages.length}`
}

function renderSessions() {
  const list = document.getElementById("session-list")
  list.innerHTML = sessions.map(s =>
    `<div class="session ${s === currentSession ? 'active' : ''}" onclick="switchSession('${s}')">${s}</div>`
  ).join("")
}

function renderMessages() {
  const container = document.getElementById("messages")
  container.innerHTML = messages.map(m =>
    `<div class="msg ${m.role}"><div class="bubble">${esc(m.content || "")}</div></div>`
  ).join("")
  container.scrollTop = container.scrollHeight
}

function esc(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

function newSession() {
  const label = prompt("Session name:") || "session-" + Date.now()
  if (!label || label === currentSession) return
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "create_session", label }))
  }
}

function switchSession(label) {
  if (label === currentSession) return
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "switch_session", label }))
  }
}

function send() {
  const input = document.getElementById("input")
  const btn = document.getElementById("send-btn")
  const prompt = input.value.trim()
  if (!prompt || generating) return

  input.value = ""
  generating = true
  btn.disabled = true
  document.getElementById("status").innerHTML = "Generating<span class='loading'></span>"

  messages.push({ role: "user", content: prompt, timestamp: new Date().toISOString() })
  renderMessages()

  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "chat", prompt }))
  }
}

connect()
</script>
</body>
</html>
